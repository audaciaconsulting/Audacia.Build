# Template: generate Yarn SBOMs using cyclonedx-yarn

parameters:
  # One or more directories that contain a package.json and yarn.lock.
  - name: yarnRoots
    type: string
    default: ''

  - name: nodeVersion
    type: string
    default: '22.x'

  # When true, runs yarn install to gather license texts.
  - name: includeLicenseTexts
    type: boolean
    default: true

  - name: publishArtifact
    type: boolean
    default: false

  - name: artifactName
    type: string
    default: 'sbom-files'

steps:
  - task: UseNode@1
    displayName: Use Node.js ${{ parameters.nodeVersion }}
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}

  - task: PowerShell@2
    displayName: "Generate Yarn SBOMs (CycloneDX, JSON)"
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        New-Item -ItemType Directory -Path "$(Agent.TempDirectory)/sbom/yarn" -Force | Out-Null

        $rootsMultiline = @'
        ${{ parameters.yarnRoots }}
        '@
        $yarnRoots = $rootsMultiline -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }

        foreach ($root in $yarnRoots) {
          $absolutePath = if ([System.IO.Path]::IsPathRooted($root)) { $root } else { Join-Path $env:SYSTEM_DEFAULTWORKINGDIRECTORY $root }
        
          $folderName = Split-Path $absolutePath -Leaf
          $outputFile = Join-Path "$(Agent.TempDirectory)/sbom/yarn" "$folderName-sbom.json"

          Write-Host "##[group]Yarn SBOM → $absolutePath"
          Push-Location $absolutePath
          try {
            if ("${{ parameters.includeLicenseTexts }}" -eq "True") {
              # --immutable ensures we don't change the lockfile in CI
              yarn install --immutable
            }

            # Generate SBOM using the Yarn-specific CycloneDX tool
            # Note: cyclonedx-yarn version 1.x is typically used for Yarn Classic, 
            # while newer versions support modern Yarn.
            npx --yes @cyclonedx/cyclonedx-yarn@latest --output-file $outputFile --output-format JSON
        
            Write-Host "Successfully generated: $outputFile"
          }
          finally {
            Pop-Location
            Write-Host "##[endgroup]"
          }
        }

  - ${{ if eq(parameters.publishArtifact, true) }}:
      - task: PublishPipelineArtifact@1
        displayName: "Publish Yarn SBOM artifact"
        inputs:
          targetPath: "$(Agent.TempDirectory)/sbom/yarn"
          artifact: ${{ parameters.artifactName }}
